name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit and integration tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build web app and extension
        run: npm run build

      - name: Validate assistant docs
        run: npm run validate:agent-docs

      - name: Validate workspace hygiene
        run: npm run validate:workspace-hygiene

      - name: Validate standalone UI surface
        run: |
          npm run preview >/tmp/qrc-preview.log 2>&1 &
          preview_pid=$!

          cleanup() {
            kill "$preview_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          for attempt in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          npm run validate:ui

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            output/playwright
            /tmp/qrc-preview.log
          if-no-files-found: ignore
